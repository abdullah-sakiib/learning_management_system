<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Password Reset - EduFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'DM Sans', sans-serif; }
    .auth-shell {
      background:
        radial-gradient(ellipse 70% 50% at 80% -10%, rgba(99, 102, 241, 0.16) 0%, transparent 60%),
        radial-gradient(ellipse 45% 35% at 0% 80%, rgba(56, 189, 248, 0.10) 0%, transparent 60%),
        #f8faff;
    }
    .auth-card {
      background: linear-gradient(180deg, #ffffff 0%, #f8faff 100%);
      border-color: #e0e7ff;
      box-shadow: 0 20px 40px rgba(79, 70, 229, 0.10);
    }
    .btn-primary {
      background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
    }
    .btn-primary:hover {
      background: #4338ca;
    }
  </style>
</head>
<body class="auth-shell min-h-screen flex items-center justify-center p-6">
  <div class="auth-card w-full max-w-md border rounded-2xl p-6">
    <h1 class="text-xl font-bold text-slate-800">Reset Password</h1>
    <p class="text-sm text-slate-500 mt-1">Enter your account email to request a reset.</p>

    {% if messages %}
    <div class="space-y-2 mt-4">
      {% for message in messages %}
      <div class="rounded-xl px-4 py-3 text-sm {% if message.tags == 'error' %}bg-red-50 text-red-700 border border-red-100{% else %}bg-emerald-50 text-emerald-700 border border-emerald-100{% endif %}">
        {{ message }}
      </div>
      {% endfor %}
    </div>
    {% endif %}

    <form method="post" action="{% url 'password_reset' %}" class="mt-5 space-y-3">
      {% csrf_token %}
      <input type="email" name="email" required placeholder="you@example.com" class="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm" />
      <button type="submit" class="btn-primary w-full text-sm font-semibold text-white transition py-2.5 rounded-xl">Request reset</button>
    </form>

    <a href="{% url 'login' %}" class="inline-flex mt-4 text-sm font-semibold text-indigo-600">Back to login</a>
  </div>
</body>
</html>
